	<script name="delete_me">window.sites={{JSON}};</script>
	<script name="delete_me">
		function build(){
			console.log(window.sites);
			for(let siteid in window.sites){
				visBuilding(siteid,window.sites[siteid].nodes);
				visEntrances(siteid,window.sites[siteid].entrances);
				visRacks(siteid,window.sites[siteid].racks);
				visDevices(siteid,window.sites[siteid].devices);
				visPPanels(siteid,window.sites[siteid].ppanels);
			};
			
			document.body.removeAttribute('onload');
			let del=document.getElementsByName('delete_me');
			while(del.length>0){del[0].remove()};
		};
		
		function val(v=''){return v?v:''};
		function getType(name){return name.replace('-','_').split('_')[0]};
		function getNum(name){return name.replace(/\W/g,'_').split('_').reverse()[0]};
		function toKP(name){return isA(name)?name.replace('A','А').replace('KR','КР'):name.replace('KR','КР')};
		function toKR(name){return name.replace('КР','KR')};
		function isL(name){return(getType(name)=='L')?true:false};
		function isCU(name){return(getType(name)=='CU')?true:false};
		function isPP(name){return(getType(name)=='PP')?true:false};
		function isCR(name){return(getType(name)=='CR')?true:false};
		function isETH(name){return(getType(name)=='ETH')?true:false};
		function isOP(name){return(getType(name)=='OP')?true:false};
		function isA(name){return(getType(name)=='A')?true:false};
		
		function visBuilding(siteid,nodes){
			document.getElementsByTagName('body')[0].insertAdjacentHTML('afterBegin',`
				<div class="tile tile-result tile-building" id="`+nodes[0].id+`">
					<div>
						<input id="btn_updEntrances_`+nodes[0].id+`" type="button" value="upd" disabled>
						<input id="btn_download_`+nodes[0].id+`" type="button" value="download" disabled>
						<span title="`+nodes[0].name+` Sites_and_Devices" style="margin-left:10px;"><a href="https://nioss/common/uobject.jsp?tab=_Sites+and+Devices&object=`+nodes[0].id+`" target="_blank">`+nodes[0].name+` (`+nodes[0].address+`)</a></span>
					</div>
					<div class="content-x-scroll"><div class="entrances-grid" id="`+nodes[0].id+`.entrances"></div></div>
					<div>
						<input id="btn_updDevices_`+nodes[0].id+`" type="button" value="upd" disabled>
						<input id="btn_pingAll_`+nodes[0].id+`" type="button" value="ping" disabled>
						`+createNodeTitle(nodes)+`
					</div>
					<div>Устройства вне шкафа:</div>
					<div class="content-x-scroll"><div class="devices-without" id="`+nodes[0].id+`.devices_without"></div></div>
					<hr>
					<div class="content-x-scroll"><div style="width:max-content;">
						<div style="display:inline-flex;width:100%;">
							<input type="button" id="btn_`+nodes[0].id+`_cls_accounts" value="X" disabled>
							<input type="button" id="btn_`+nodes[0].id+`_get_accounts" value="get_accounts" disabled>
							<input type="button" id="btn_`+nodes[0].id+`_acc_export_csv_x" value="acc_export_x" disabled>
							<input type="button" id="btn_`+nodes[0].id+`_acc_export_csv" value="acc_export" disabled>
							<input type="button" id="btn_`+nodes[0].id+`_test_auto_rebind" value="test_auto_rebind" disabled>
							<input type="file" id="file_`+nodes[0].id+`_import_csv" disabled>
						</div>
						<div class="cols hide" id="`+nodes[0].id+`.accounts_table">
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_0" style="order:-1;"><div class="cth c-0"></div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_1" style="order:1;"><div class="cth cmw4">entrance</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_2" style="order:2;"><div class="cth cmw2">floor</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_3" style="order:3;"><div class="cth cmw2">flat</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_4" style="order:4;"><div class="cth cmw7">account</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_5" style="order:5;"><div class="cth cmw4">id</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_6" style="order:6;"><div class="cth cmw2">voip</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_7" style="order:7;"><div class="cth cmw8">ip</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_8" style="order:8;"><div class="cth cmw8">switch</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_9" style="order:9;"><div class="cth cmw2">port</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_10" style="order:10;"><div class="cth cmw8">mac</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_11" style="order:11;"><div class="cth cmw8">mac</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_12" style="order:12;"><div class="cth cmw10">start</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_13" style="order:13;"><div class="cth cmw5">sessionid</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_14" style="order:14;"><div class="cth cmw2" style="display:inline-flex;">
								<input type="button" type="button" id="btn_`+nodes[0].id+`_get_online_sessions" value="S">
								<input type="button" type="button" id="btn_`+nodes[0].id+`_stop_session_radius" value="X"></div>
							</div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_15" style="order:15;"><div class="cth cmw8">switch</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_16" style="order:16;"><div class="cth cmw2">port</div></div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_17" style="order:17;"><div class="cth cmw2">
								<input type="button" id="btn_`+nodes[0].id+`_set_bind" value="ALL"></div>
							</div>
							<div class="col" id="`+nodes[0].id+`.accounts_table.col_18" style="order:18;"><div class="cth cmw10">result</div></div>
						</div>
					</div></div>
				</div>`);
			document.getElementById('btn_updEntrances_'+nodes[0].id).addEventListener('click',function(){});
			document.getElementById('btn_download_'+nodes[0].id).addEventListener('click',function(){});
			document.getElementById('btn_updDevices_'+nodes[0].id).addEventListener('click',function(){});
			document.getElementById('btn_pingAll_'+nodes[0].id).addEventListener('click',function(){});
		};
		function createNodeTitle(nodes){
			let title='';
			for(let node of nodes){
				title+=`<span title="`+node.node+` Параметры" style="margin-left:10px;"><a href="https://nioss/common/uobject.jsp?tab=_Parameters&object=`+node.uzel_id+`" target="_blank">`+node.node+`</a></span>`;
			};
			return title;
		};
		
		function visEntrances(siteid,entrances){
			for(let id in entrances){let entrance=entrances[id];
				function createEntranceTitle(e){return getType(e.name)+'#'+getNum(e.name)};
				document.getElementById(siteid+'.entrances').insertAdjacentHTML('beforeEnd',`
					<div class="floors-over" id="`+entrance.id+`.over" style="grid-column:`+(+entrance.number+1)+`/`+(+entrance.number+2)+`;grid-row:2/3;">
						<div class="entrance-head" style="order:9999;">
							<div class="entrance-title" id="`+entrance.id+`_title" title="`+entrance.name+` Sites_and_Devices">
								<a href="https://nioss/common/uobject.jsp?tab=_Sites+and+Devices&object=`+entrance.id+`" target="_blank">`+createEntranceTitle(entrance)+`</a>
								<input style="width:15px;margin-left:5px;background-color:#ddd;" type="text" value="`+entrance.number+`" disabled>
							</div>
							<div>
								<input style="width:15px;background-color:#ddd;" type="text" value="`+entrance.flats.count+`" disabled>
								<input style="width:30px;margin-left:10px;background-color:#ddd;" type="text" value="`+entrance.flats.from+`" disabled>
								<input style="width:30px;margin-left:5px;background-color:#ddd;" type="text" value="`+entrance.flats.to+`" disabled>
							</div>
						</div>
						`+createFloor(entrance.id,'','cherdak')+`
						`+createFloor(entrance.id,'','tehetag')+`
					</div>
					<div class="floors-under" id="`+entrance.id+`.under" style="grid-column:`+(+entrance.number+1)+`/`+(+entrance.number+2)+`;grid-row:3/4;">
						`+createFloor(entrance.id,'','podval')+`
					</div>`);
				for(let floor of entrance.floor){/*перебор этажей*/
					document.getElementById(entrance.id+((+floor.number>0)?'.over':'.under')).insertAdjacentHTML('beforeEnd',createFloor(entrance.id,floor.number,'',floor.first,floor.last,floor.flats));
					for(let flat of floor.flats){/*перебор хат*/
						let flatHtml=document.getElementById(entrance.id+'.flat_'+flat.number);
						flatHtml.classList.add('on-service');
						for(let service of flat.services){/*перебор услуг в квартире*/
							switch(service.service_id){
								case'1':flatHtml.classList.add('inet');document.getElementById(entrance.id+'.flat_'+flat.number+'.spd').classList.add(service.status);break;
								case'2':case'4':case'16':flatHtml.classList.add('tv');document.getElementById(entrance.id+'.flat_'+flat.number+'.tv').classList.add(service.status);break;
								case'8':flatHtml.classList.add('voip');document.getElementById(entrance.id+'.flat_'+flat.number+'.spd').classList.add(service.status);break;
							};
						};
						for(let account of flat.subscribers){
							/*flatHtml.classList.add('account_'+account.account.match(/\d/g).join(''));*/
							document.getElementById(entrance.id+'.flat_'+flat.number+'.number').innerHTML=`<a href="http://inetcore.mts.ru/#/`+account.account+`" target="_blank">`+flat.number+`</a>`;
						};
					};
				};
				if(entrance.floor.length<=entrance.flats.count){/*фейковые этажи для выравнивание падиков по низу*/
					for(var f_number=0;f_number<entrance.floor[0].number;f_number++){
						document.getElementById(entrance.id+((f_number>0)?'.over':'.under')).insertAdjacentHTML('beforeEnd',createFloor(entrance.id,f_number));
					};
				};
			};
		};
		function createFloor(entrance_id,number='0',type='',flat_first=0,flat_last=0,flats=[]){/*этаж падика*/
			let floor={
				'cherdak':{name:'cherdak',order:'1001',title:'Ч',flats:createNoFlats('чердак'),variant:''},
				'tehetag':{name:'tehetag',order:'1000',title:'Т',flats:createNoFlats('тех. этаж'),variant:''},
				'podval':{name:'podval',order:'1000',title:'П',flats:createNoFlats('подвал'),variant:''},
				'':{
					name:'floor_'+number,
					order:((Math.abs(+number)+10)*10),
					title:number,
					flats:((flat_first&&flat_last||flats.length>0)?createEmptyFlats(entrance_id,flat_first,flat_last):createNoFlats()),
					variant:(+number%2==0)?'floor-even':'floor-neven',
				},
			}[type];
			return `
				<div class="floor `+floor.name+`" id="`+entrance_id+`.`+floor.name+`" style="order:`+floor.order+`;">
					<div class="floor-number">`+floor.title+`</div>
					<div class="floor-objects" id="`+entrance_id+`.`+floor.name+`.objects">
						<div class="floor-racks" id="`+entrance_id+`.`+floor.name+`.racks"></div>
						<div class="floor-racks floor-rk" id="`+entrance_id+`.`+floor.name+`.rk"></div>
						<div class="floor-flats `+floor.variant+`" id="`+entrance_id+`.`+floor.name+`.flats">
							`+floor.flats+`
						</div>
					</div>
				</div>`;
		};
		function createNoFlats(name=''){return `<div class="flat-none">`+name+`</div>`};
		function createEmptyFlats(entrance_id,f_first,f_last){/*заготовки квартир на этаж*/
			let newFlatsRow='';
			for(let flat=f_first;flat<f_last+1;flat++){
				newFlatsRow+=`<div class="flat" id="`+entrance_id+`.flat_`+flat+`" style="order:`+flat+`;">
					<div id="`+entrance_id+`.flat_`+flat+`.number">`+flat+`</div>
					<div class="flat-service" id="`+entrance_id+`.flat_`+flat+`.spd">шпд</div>
					<div class="flat-service" id="`+entrance_id+`.flat_`+flat+`.tv">тв</div>
				</div>`
			};		
			return newFlatsRow;
		};
		
		function visRacks(siteid,racks){
			for(let id in racks){let rack=racks[id];
				let container=rack.entrance.id+'.'+((rack.off_floor=='Подвал')?'podval':(rack.off_floor=='Чердак')?'cherdak':(rack.off_floor=='Технический этаж')?'tehetag':('floor_'+rack.floor))+((isCU(rack.name))?'.rk':(isL(rack.name))?'.racks':'.racks');
				if(!document.getElementById(container)){/*если шкаф на этаже вне подъезда*//*ду0000000054КР-02878*/
					document.getElementById(rack.entrance.id+((rack.off_floor=='Подвал'||rack.floor<=0)?'.under':'.over')).insertAdjacentHTML('beforeEnd',createFloor(rack.entrance.id,rack.floor,((rack.off_floor=='Подвал')?'podval':(rack.off_floor=='Чердак')?'cherdak':(rack.off_floor=='Технический этаж')?'tehetag':'')));
				};
				
				let devices={ne:``,	pp:``};
				for(let device of rack.ne_in_rack){
					if(isPP(device)||isCR(device)){
						devices.pp+=createPP({name:device,inrack:rack.name,ghost:'ghost'});
					}else{
						devices.ne+=createDevice({name:device,ip:'',inrack:rack.name,ghost:'ghost'});
					};
				};
				function createRackTitle(r){return getType(r.name)+'#'+getNum(r.name)};
				let title=`<span class="title-norm">`+createRackTitle(rack)+`</span><span class="title-short">`+createRackTitle(rack)+`</span>`;
				document.getElementById(container).insertAdjacentHTML('beforeEnd',`
					<div class="rack `+((rack.name)?(`type-`+getType(rack.name)):`type-unknown`)+`" id="`+rack.id+`" style="order:`+((rack.n_rack_site)?rack.n_rack_site:getNum(rack.name))+`;">
						<div class="rack-head">
							<div class="rack-title" id="`+rack.id+`_title">
								<a href="https://nioss/ncobject.jsp?id=`+rack.id+`" target="_blank">`+title+`</a>
							</div>
						</div>
						<div class="rack-devices" id="`+rack.name+`.devices_ne">`+devices.ne+`</div>
						<div class="rack-devices" id="`+rack.id+`.devices_pp">`+devices.pp+`</div>
					</div>`);
			};
		};
		
		function visDevices(siteid,devices){
			for(let id in devices){let device=devices[id];
				let inrack=document.getElementById(toKP(device.name));
				document.getElementById(((inrack)?(inrack.getAttribute('inrack')+'.devices_ne'):(siteid+'.devices_without'))).insertAdjacentHTML('beforeEnd',createDevice(device));
			};
		};
		function createDeviceTitleIP(d){return getType(d.name)+'#'+getNum(d.name)+((d.ip)?('&nbsp;..'+d.ip.split('.')[2]+'.'+d.ip.split('.')[3]):'')};
		function createDeviceTitle(d){return getType(d.name)+'#'+getNum(d.name)};
		function createDevice(device){
			let kpname=toKP(device.name);
			if(document.getElementById(kpname)){document.getElementById(kpname).remove();};
			let title=`<span class="title-norm">`+createDeviceTitleIP(device)+`</span><span class="title-short">`+createDeviceTitle(device)+`</span>`;
			let inrack=(device.inrack)?(`inrack="`+device.inrack+`"`):'';
			return `
				<div class="device type-`+getType(kpname)+((device.ghost)?` ghost`:``)+`" id="`+kpname+`" `+inrack+`>
					<div class="device-head">
						<div class="device-title" id="`+kpname+`_title">
							<a href="https://nioss/ncobject.jsp?id=`+device.nioss_id+`" target="_blank">`+title+`</a>
						</div>
						<div class="device-led" id="`+kpname+`.led"></div>
					</div>
				</div>`;
		};
		
		function visPPanels(siteid,ppanels){
			for(let id in ppanels){let pp=ppanels[id];
				if(pp.rack_id=='0'){
					let container=pp.entrance_id+'.floor_'+pp.n_floor+'.rk';
					if(!document.getElementById(container)){
						document.getElementById(pp.entrance_id+((pp.n_floor<=0)?'.under':'.over')).insertAdjacentHTML('beforeEnd',createFloor(pp.entrance_id,pp.n_floor));
					};
					document.getElementById(container).insertAdjacentHTML('beforeEnd',createPP(pp));
				}else{
					let container=document.getElementById(pp.rack_id+'.devices_pp');
					if(container){
						container.insertAdjacentHTML('beforeEnd',createPP(pp));
					}else{
						
					};
				};
			};
		};
		function createPPTitle(p){return getType(p.name)+'#'+getNum(p.name)};
		function createPP(pp){
			let kpname=toKP(pp.name);
			if(document.getElementById(kpname)){document.getElementById(kpname).remove();};
			let title=`<span class="title-norm">`+createPPTitle(pp)+`</span><span class="title-short">`+createPPTitle(pp)+`</span>`;
			let inrack=(pp.inrack)?(`inrack="`+pp.inrack+`"`):'';
			return `
				<div class="device type-`+getType(kpname)+((pp.rack_id=='0')?` without`:``)+((pp.ghost)?` ghost`:``)+`" id="`+kpname+`" `+inrack+`>
					<div class="device-head">
						<div class="device-title" id="`+kpname+`_title">
							<a href="https://nioss/ncobject.jsp?id=`+pp.id+`" target="_blank">`+title+`</a>
						</div>
					</div>
				</div>`;
		};
	</script>
</head>
