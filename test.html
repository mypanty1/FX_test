<!DOCTYPE>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>QR код тест</title>
</head>
<body>
<script>
var code='М'+randcode(2,'0123456789')+randcode(7);document.body.insertAdjacentHTML('beforeEnd',`<div style="width:100%;text-align:center;font-family:monospace;font-size:40px;"><div>`+code+`</div><div onclick="window.print();"><img src="https://chart.googleapis.com/chart?cht=qr&chs=300x300&choe=UTF-8&chld=M&chl=`+code+`"></div></div>`);function randcode(n=1,d='0123456789zaqwsxcderfvbgtyhnmjuiklopZAQWSXCDERFVBGTYHNMJUIKLOP'){let str='';while(str.length<n){str+=d[Math.random()*d.length|0]};return str};
</script>
</body>
</html>
