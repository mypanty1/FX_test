 <body>

let str='М54'+new Date().getTime().toString().substring(6,13);

let iframe=document.createElement('iframe');
iframe.src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data='+str;
document.body.appendChild(iframe);
</script>
